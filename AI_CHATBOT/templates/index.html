<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <h1>AI Chatbot</h1>
        <div id="chat-box"></div>
        <input type="text" id="user-input" placeholder="Type a message..." autofocus>
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        function sendMessage() {
            let userInput = document.getElementById("user-input").value;
            if(userInput.trim() === "") return;

            // Display user message
            let chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<div class="user-msg">${userInput}</div>`;

            // Send message to Flask
            fetch("/get_response", {
                method: "POST",
                headers: {"Content-Type": "application/x-www-form-urlencoded"},
                body: `user_input=${encodeURIComponent(userInput)}`
            })
            .then(response => response.json())
            .then(data => {
                chatBox.innerHTML += `<div class="bot-msg">${data.bot_reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight; // scroll down
            });

            document.getElementById("user-input").value = "";
        }

        // Press Enter to send
        document.getElementById("user-input").addEventListener("keypress", function(e){
            if(e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
